apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - tgb.yaml       # generated at deploy time with real TG ARNs

# Image tags are set by the pipeline at deploy time via:
#   kustomize edit set image api=<registry>/<repo>:<tag>
#   kustomize edit set image web=<registry>/<repo>:<tag>
images:
  - name: api
    newName: PLACEHOLDER
    newTag: PLACEHOLDER
  - name: web
    newName: PLACEHOLDER
    newTag: PLACEHOLDER
