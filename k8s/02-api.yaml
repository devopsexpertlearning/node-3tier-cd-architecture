apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: node-3tier-app
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  # Zero-downtime rolling update strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        # Tag will be injected by the CI/CD pipeline
        image: ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}-${ENV}-api:${IMAGE_TAG}
        ports:
        - containerPort: 3001
        env:
        - name: DBHOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: host
        - name: DBUSER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: DBPASS
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: DB
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: dbname
        - name: DBPORT
          value: "5432"
        - name: DBSSL
          value: "true"
        # Health checks for fault tolerance
        readinessProbe:
          httpGet:
            path: /api/status
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/status
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: node-3tier-app
spec:
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
