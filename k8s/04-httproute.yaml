# ==============================================================================
# Envoy Gateway HTTPRoute Configuration
# ==============================================================================
# This creates an HTTPRoute that natively integrates with our Envoy Gateway
# to expose the application to the internet via the ALB.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web-route
  namespace: node-3tier-app
spec:
  parentRefs:
  - name: eg
    namespace: envoy-gateway-system
  rules:
  # Route traffic to the Web UI
  - matches:
    - path:
        type: PathPrefix
        value: "/"
    backendRefs:
    - name: web-service
      port: 3000
      
  # Route /api traffic directly to the API service, bypassing the Web UI
  - matches:
    - path:
        type: PathPrefix
        value: "/api"
    backendRefs:
    - name: api-service
      port: 3001
