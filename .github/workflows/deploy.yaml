name: Deploy to Amazon EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_API: node-3tier-dev-api
  ECR_REPOSITORY_WEB: node-3tier-dev-web
  EKS_CLUSTER_NAME: node-3tier-dev-eks

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies and test API
        working-directory: ./api
        run: |
          npm ci
          npm test --if-present

      - name: Install dependencies and test Web
        working-directory: ./web
        run: |
          npm ci
          npm test --if-present

  build-and-deploy:
    name: Build, Push, and Deploy
    needs: test
    runs-on: ubuntu-latest
    
    # Required for OIDC AWS authentication
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Strongly recommended approach: AWS OIDC Web Identity Federation
      # Alternatively, you can use standard AWS_ACCESS_KEY_ID secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-eks-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push API image to Amazon ECR
        id: build-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_API:$IMAGE_TAG ./api
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_API:$IMAGE_TAG
          echo "api_image=$ECR_REGISTRY/$ECR_REPOSITORY_API:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build, tag, and push Web image to Amazon ECR
        id: build-web
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG ./web
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG
          echo "web_image=$ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        env:
          API_IMAGE: ${{ steps.build-api.outputs.api_image }}
          WEB_IMAGE: ${{ steps.build-web.outputs.web_image }}
        run: |
          # Use sed/envsubst to inject the new image URIs into the Kubernetes manifests
          # Then apply the changes
          
          # Install envsubst for template replacement
          sudo apt-get install gettext-base
          
          # Export variables for the manifests (using standard bash substitution trick inside the loop)
          export ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          export AWS_REGION=${{ env.AWS_REGION }}
          export PROJECT_NAME=node-3tier
          export ENV=dev
          export IMAGE_TAG=${{ github.sha }}

          # Apply Namespace first
          kubectl apply -f k8s/01-namespace.yaml

          # Create a temporary directory for processed manifests
          mkdir -p .k8s-processed
          
          # Process and apply the rest of the manifests
          for file in k8s/*.yaml; do
            envsubst < "$file" > ".k8s-processed/$(basename $file)"
          done
          
          kubectl apply -f .k8s-processed/

      - name: Verify Web Deployment Rollout
        run: |
          kubectl rollout status deployment/web-deployment -n node-3tier-app --timeout=300s

      - name: Verify API Deployment Rollout
        run: |
          kubectl rollout status deployment/api-deployment -n node-3tier-app --timeout=300s
