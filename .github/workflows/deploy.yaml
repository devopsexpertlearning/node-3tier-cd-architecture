name: Deploy to Amazon EKS

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'web/**'
      - 'k8s/**'
  workflow_run:
    workflows: ["Terraform Infrastructure"]
    types: [completed]
    branches:
      - main

# Prevent concurrent deploys — never cancel mid-deploy (pods could be inconsistent)
concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: false

# ── JOB 1: CHECK ─────────────────────────────────────────────────────────────
jobs:
  check:
    name: Check Deploy Conditions
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
      commit_sha:    ${{ steps.decide.outputs.commit_sha }}
    steps:
      - name: Evaluate trigger
        id: decide
        uses: actions/github-script@v7
        with:
          script: |
            const appPaths = ['api/', 'web/', 'k8s/'];

            if (context.eventName === 'push') {
              const { data: tfRuns } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'terraform.yaml',
                head_sha: context.sha,
              });

              if (tfRuns.total_count > 0) {
                console.log('Terraform also triggered — deferring to workflow_run');
                core.setOutput('should_deploy', 'false');
                return;
              }

              console.log('App-only push — deploying');
              core.setOutput('should_deploy', 'true');
              core.setOutput('commit_sha', context.sha);
              return;
            }

            const run = context.payload.workflow_run;

            if (run.conclusion !== 'success') {
              console.log(`Terraform ${run.conclusion} — skipping deploy`);
              core.setOutput('should_deploy', 'false');
              return;
            }

            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: run.head_sha,
            });

            const appChanged = commit.files.some(f =>
              appPaths.some(p => f.filename.startsWith(p))
            );

            console.log(`Terraform completed + app changed: ${appChanged}`);
            core.setOutput('should_deploy', appChanged ? 'true' : 'false');
            core.setOutput('commit_sha', run.head_sha);

# ── JOB 2: TEST ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            api/package-lock.json
            web/package-lock.json

      - name: Test API
        working-directory: ./api
        run: |
          npm ci
          npm test --if-present

      - name: Test Web
        working-directory: ./web
        run: |
          npm ci
          npm test --if-present

# ── JOB 3: BUILD API (parallel with build-web) ───────────────────────────────
  build-api:
    name: Build API
    needs: [check, test]
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image: ${{ steps.meta.outputs.image }}

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.commit_sha }}

      - name: Set image tag
        id: meta
        run: |
          SHA="${{ needs.check.outputs.commit_sha }}"
          IMAGE_TAG="${{ github.run_id }}-${SHA:0:7}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_API }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build with layer cache — significantly faster on repeated builds
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          load: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_API }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Scan API image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_API }}:${{ steps.meta.outputs.image_tag }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push API image to ECR
        run: docker push ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_API }}:${{ steps.meta.outputs.image_tag }}

# ── JOB 4: BUILD WEB (parallel with build-api) ───────────────────────────────
  build-web:
    name: Build Web
    needs: [check, test]
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image: ${{ steps.meta.outputs.image }}

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.commit_sha }}

      - name: Set image tag
        id: meta
        run: |
          SHA="${{ needs.check.outputs.commit_sha }}"
          IMAGE_TAG="${{ github.run_id }}-${SHA:0:7}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_WEB }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          load: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_WEB }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Scan Web image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_WEB }}:${{ steps.meta.outputs.image_tag }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push Web image to ECR
        run: docker push ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_WEB }}:${{ steps.meta.outputs.image_tag }}

# ── JOB 5: DEPLOY ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    needs: [check, build-api, build-web]
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.commit_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}

      - name: Create namespace
        run: kubectl apply -f k8s/01-namespace.yaml

      - name: Sync db-credentials from AWS Secrets Manager
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id ${{ vars.RDS_SECRET_NAME }} \
            --query SecretString --output text)

          kubectl create secret generic db-credentials \
            --namespace node-3tier-app \
            --from-literal=host=$(echo $SECRET_JSON     | jq -r '.host') \
            --from-literal=username=$(echo $SECRET_JSON | jq -r '.username') \
            --from-literal=password=$(echo $SECRET_JSON | jq -r '.password') \
            --from-literal=dbname=$(echo $SECRET_JSON   | jq -r '.dbname') \
            --save-config --dry-run=client -o yaml | kubectl apply -f -

      - name: Run DB init job
        run: |
          kubectl delete job db-init -n node-3tier-app --ignore-not-found=true
          kubectl apply -f k8s/06-db-init.yaml
          kubectl wait --for=condition=complete job/db-init \
            -n node-3tier-app --timeout=120s

      - name: Deploy app manifests
        run: |
          sudo apt-get install -y gettext-base

          SHA="${{ needs.check.outputs.commit_sha }}"
          export AWS_REGION=${{ vars.AWS_REGION }}
          export ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          export PROJECT_NAME=${{ vars.PROJECT_NAME }}
          export ENV=${{ github.environment }}
          export IMAGE_TAG="${{ github.run_id }}-${SHA:0:7}"

          mkdir -p .k8s-processed
          for file in k8s/*.yaml; do
            name=$(basename $file)
            [[ "$name" == "01-namespace.yaml" || "$name" == "06-db-init.yaml" ]] && continue
            envsubst '${AWS_REGION} ${ACCOUNT_ID} ${PROJECT_NAME} ${ENV} ${IMAGE_TAG}' \
              < "$file" > ".k8s-processed/$name"
          done

          kubectl apply -f .k8s-processed/

      - name: Verify Web rollout
        run: kubectl rollout status deployment/web-deployment -n node-3tier-app --timeout=300s

      - name: Verify API rollout
        run: kubectl rollout status deployment/api-deployment -n node-3tier-app --timeout=300s

      # Runs only if any step above failed — restores last known good version
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back..."
          kubectl rollout undo deployment/api-deployment -n node-3tier-app || true
          kubectl rollout undo deployment/web-deployment -n node-3tier-app || true
          kubectl rollout status deployment/api-deployment -n node-3tier-app --timeout=120s
          kubectl rollout status deployment/web-deployment -n node-3tier-app --timeout=120s
          echo "Rollback complete"
