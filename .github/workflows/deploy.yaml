name: Deploy to Amazon EKS

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'web/**'
      - 'k8s/**'

# Prevent concurrent deploys — never cancel mid-deploy
concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: false

# Image tag is deterministic — same value computed independently in each job
# Format: {run_id}-{short_sha}  e.g. 12345678901-abc1234
env:
  IMAGE_TAG: ${{ github.run_id }}-${{ github.sha && github.sha || '' }}

# STAGE 1 — TEST
jobs:
  test:
    name: "[1] Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            api/package-lock.json
            web/package-lock.json

      - name: Test API
        working-directory: ./api
        run: |
          npm ci
          npm test --if-present

      - name: Test Web
        working-directory: ./web
        run: |
          npm ci
          npm test --if-present

# STAGE 2 — BUILD
  build-api:
    name: "[2] Build API"
    needs: test
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${{ github.run_id }}-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and export to tar — does NOT push to ECR yet
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          outputs: type=docker,dest=/tmp/api.tar
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_API }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Upload API image artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-image-${{ github.run_id }}
          path: /tmp/api.tar
          retention-days: 1

  build-web:
    name: "[2] Build Web"
    needs: test
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${{ github.run_id }}-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          outputs: type=docker,dest=/tmp/web.tar
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_WEB }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Upload Web image artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-image-${{ github.run_id }}
          path: /tmp/web.tar
          retention-days: 1

# STAGE 3 — SCAN
  scan-api:
    name: "[3] Scan API"
    needs: build-api
    runs-on: ubuntu-latest
    steps:
      - name: Download API image artifact
        uses: actions/download-artifact@v4
        with:
          name: api-image-${{ github.run_id }}
          path: /tmp

      # Scan directly from tar file — no ECR login needed
      - name: Trivy scan API image
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/api.tar
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

  scan-web:
    name: "[3] Scan Web"
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Download Web image artifact
        uses: actions/download-artifact@v4
        with:
          name: web-image-${{ github.run_id }}
          path: /tmp

      - name: Trivy scan Web image
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/web.tar
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

# STAGE 4 — PUSH
  push-api:
    name: "[4] Push API"
    needs: scan-api
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Set image tag
        id: meta
        run: echo "image_tag=${{ github.run_id }}-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download API image artifact
        uses: actions/download-artifact@v4
        with:
          name: api-image-${{ github.run_id }}
          path: /tmp

      - name: Load and push API image to ECR
        run: |
          docker load --input /tmp/api.tar
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_API }}:${{ steps.meta.outputs.image_tag }}

  push-web:
    name: "[4] Push Web"
    needs: scan-web
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Set image tag
        id: meta
        run: echo "image_tag=${{ github.run_id }}-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download Web image artifact
        uses: actions/download-artifact@v4
        with:
          name: web-image-${{ github.run_id }}
          path: /tmp

      - name: Load and push Web image to ECR
        run: |
          docker load --input /tmp/web.tar
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_WEB }}:${{ steps.meta.outputs.image_tag }}

# STAGE 5 — DEPLOY
  deploy:
    name: "[5] Deploy to EKS"
    needs: [push-api, push-web]
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=${{ github.run_id }}-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}

      - name: Create namespace
        run: kubectl apply -f k8s/base/namespace.yaml

      - name: Sync db-credentials from AWS Secrets Manager
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id ${{ vars.RDS_SECRET_NAME }} \
            --query SecretString --output text)

          kubectl create secret generic db-credentials \
            --namespace node-3tier-app \
            --from-literal=host=$(echo $SECRET_JSON     | jq -r '.host') \
            --from-literal=username=$(echo $SECRET_JSON | jq -r '.username') \
            --from-literal=password=$(echo $SECRET_JSON | jq -r '.password') \
            --from-literal=dbname=$(echo $SECRET_JSON   | jq -r '.dbname') \
            --save-config --dry-run=client -o yaml | kubectl apply -f -

      - name: Run DB init job
        run: |
          kubectl delete job db-init -n node-3tier-app --ignore-not-found=true
          kubectl apply -f k8s/jobs/db-init.yaml
          kubectl wait --for=condition=complete job/db-init \
            -n node-3tier-app --timeout=300s

      - name: Deploy app manifests
        run: |
          ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
          IMAGE_TAG=${{ steps.meta.outputs.image_tag }}

          # Fetch web target group ARN dynamically from AWS
          TG_ARN_WEB=$(aws elbv2 describe-target-groups \
            --region ${{ vars.AWS_REGION }} \
            --query "TargetGroups[?TargetGroupName=='${{ vars.PROJECT_NAME }}-${{ vars.ENV }}-web'].TargetGroupArn" \
            --output text)
          echo "TG_ARN_WEB=${TG_ARN_WEB}"

          # Generate tgb.yaml with real web TG ARN
          cat > k8s/overlays/dev/tgb.yaml << EOF
          apiVersion: elbv2.k8s.aws/v1beta1
          kind: TargetGroupBinding
          metadata:
            name: web-tgb
            namespace: node-3tier-app
          spec:
            serviceRef:
              name: web-service
              port: 3000
            targetGroupARN: ${TG_ARN_WEB}
            targetType: ip
          EOF

          # Set image tags in the overlay kustomization
          cd k8s/overlays/dev
          kustomize edit set image \
            api=${ECR_REGISTRY}/${{ vars.PROJECT_NAME }}-${{ vars.ENV }}-api:${IMAGE_TAG}
          kustomize edit set image \
            web=${ECR_REGISTRY}/${{ vars.PROJECT_NAME }}-${{ vars.ENV }}-web:${IMAGE_TAG}
          cd -

          # Apply everything via kustomize
          kubectl apply -k k8s/overlays/dev/

      - name: Verify Web rollout
        run: kubectl rollout status deployment/web-deployment -n node-3tier-app --timeout=300s

      - name: Verify API rollout
        run: kubectl rollout status deployment/api-deployment -n node-3tier-app --timeout=300s

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back..."
          kubectl rollout undo deployment/api-deployment -n node-3tier-app || true
          kubectl rollout undo deployment/web-deployment -n node-3tier-app || true
          kubectl rollout status deployment/api-deployment -n node-3tier-app --timeout=120s
          kubectl rollout status deployment/web-deployment -n node-3tier-app --timeout=120s
          echo "Rollback complete"
