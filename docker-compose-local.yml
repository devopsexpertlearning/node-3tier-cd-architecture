services:
  db:
    image: postgres:17-alpine
    env_file:
      - .env
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: 3tier-api:local
    env_file:
      - .env
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    depends_on:
      - db

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: 3tier-web:local
    env_file:
      - .env
    environment:
      - PORT=${WEB_PORT:-3000}
    ports:
      - "${WEB_PORT:-3000}:${WEB_PORT:-3000}"
    depends_on:
      - api
